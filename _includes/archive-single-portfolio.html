{% include base_path %}

{% assign thumb_w = 400 %}  {# change this number if you want bigger/smaller #}

<article class="portfolio-item" style="margin:26px 0;">
  <!-- Title above -->
  <h3 style="margin:0 0 12px 0;">
    <a href="{{ post.github_url }}" target="_blank" rel="noopener">
      {{ post.title }}
    </a>
  </h3>

  <!-- Image left + info right -->
  <div style="display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap;">
    {% if post.header.teaser %}
      <a href="{{ post.github_url }}" target="_blank" rel="noopener"
         style="flex:0 0 {{ thumb_w }}px; max-width:{{ thumb_w }}px;">
        <img
          src="{{ base_path }}{{ post.header.teaser }}"
          alt="{{ post.title }}"
          style="width:{{ thumb_w }}px !important; max-width:{{ thumb_w }}px !important; height:auto !important; border-radius:12px; display:block;"
        />
      </a>
    {% endif %}

    <div style="flex:1; min-width:260px;">
      {% if post.excerpt %}
        <p style="margin:0 0 10px 0;">{{ post.excerpt }}</p>
      {% endif %}

      {% if post.tech_stack %}
        <p style="margin:0; opacity:0.85;">
          <strong>Tech:</strong> {{ post.tech_stack | join: " · " }}
        </p>
      {% endif %}
    </div>
  </div>
</article>
